<script type="application/ld+json">{"@context":"https://schema.org","@graph":[{"@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"Home","item":"https://lamproskonstantellos.com"},{"@type":"ListItem","position":2,"name":"News","item":"https://lamproskonstantellos.com/news"},{"@type":"ListItem","position":3,"name":"Third Best Paper Award at IEEE PESS 2025","item":"https://lamproskonstantellos.com/news/ieee-pess-2025-best-paper-award"}]},{"@type":"Article","headline":"Third Best Paper Award at IEEE PESS 2025","description":"Our work on PV and Vehicle-to-Grid integration in the isolated island grid of Kastellorizo received the 3rd Best Paper Award at IEEE PESS 2025 in Munich.","image":"https://lamproskonstantellos.com/news/ieee-pess-2025-best-paper-award/cover.jpg","datePublished":"2025-10-10","dateModified":"2025-10-10","author":{"@type":"Person","name":"Lampros Konstantellos","url":"https://lamproskonstantellos.com"},"publisher":{"@type":"Person","name":"Lampros Konstantellos","url":"https://lamproskonstantellos.com"},"mainEntityOfPage":"https://lamproskonstantellos.com/news/ieee-pess-2025-best-paper-award","articleBody":"From 8–10 October 2025, I attended the **IEEE Power and Energy Student Summit (PESS) 2025** in Munich, hosted at the **Chair of Electric Power Transmission and Distribution** of the **Technical University of Munich**. The summit brought together students, researchers, and engineers working on smart grids, renewable energy systems, storage, and the practical challenges of the energy transition.\n\nI was honoured that our paper, **\"Integration of PV and V2G Technology in an Island Grid: A Real-Time Simulation Study of Kastellorizo\"**, received the **3rd Best Paper Award**. The work originated from my thesis at the **Department of Electrical and Computer Engineering** of the **University of Patras**, supervised by Prof. **George Konstantopoulos**, and was carried out in co-supervision with Prof. **Thomas Hamacher** at the Chair of Renewable and Sustainable Energy Systems of the **Technical University of Munich**.\n\nThe paper examines how **photovoltaic generation** and **Vehicle-to-Grid (V2G)** technology can support the operation of a small non-interconnected island grid. The case study focused on **Kastellorizo**, using actual grid data from **HEDNO**, and the island's medium-voltage network was modelled on the **Typhoon HIL** real-time simulation platform.\n\nThe results showed that V2G can improve the grid's frequency response during disturbances, while also reducing diesel generator output and CO₂ emissions in the simulated scenarios. More broadly, the study points to the potential of combining renewables and electric mobility in small, vulnerable power systems.\n\nMany thanks to my co-authors **Theodoros Kavvathas**, Prof. **George Konstantopoulos**, Dr. **Anurag Mohapatra**, and Prof. **Thomas Hamacher** for the guidance and collaboration throughout this work.\n\nBeyond the award itself, PESS 2025 was a valuable opportunity to discuss energy system research with people working on similar challenges from different perspectives. It strengthened my interest in island grids, storage, electric mobility, and real-time simulation as part of the future power system.","wordCount":294,"inLanguage":"en","keywords":"IEEE PESS, V2G, Vehicle-to-Grid, PV integration, Kastellorizo, island grid, real-time simulation, Greece","articleSection":"Conferences and Awards"}]}</script>
